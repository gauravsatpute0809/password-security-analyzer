<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Password </title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
</head>

<body>

<div id="particles-js"></div>

<div class="container main-content text-center">

    <h1 class="neon-title">CYBER PASSWORD </h1>
    <p class="subtitle">Advanced Vulnerability Ranking System</p>

    <div class="input-group input-group-lg mt-4 mx-auto" style="max-width:800px;">

        <input type="password"
               id="password"
               class="form-control cyber-input"
               placeholder="Enter or generate password..."
               onkeyup="analyze()">

        <button class="btn btn-outline-info" onclick="togglePassword()">👁</button>
        <button class="btn btn-neon" onclick="analyze()">Analyze</button>

    </div>

    <button class="btn btn-cyber mt-3" onclick="generate()">
        Generate Strong Password
    </button>

    <div class="container mt-5">
        <div class="row g-4">

            <div class="col-md-3">
                <div class="card-box">
                    <h5>Entropy</h5>
                    <p id="entropy" class="highlight">-</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h5>Leak Status</h5>
                    <p id="leak" class="highlight">-</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h5>Prediction</h5>
                    <p id="ai" class="highlight">-</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card-box">
                    <h5>Estimated Crack Time</h5>
                    <p id="crackTime" class="highlight">-</p>
                </div>
            </div>

        </div>
    </div>

    <div class="progress mt-4">
        <div id="bar" class="progress-bar"></div>
    </div>

    <p id="strengthLabel" class="mt-3 fw-bold"></p>

    <div class="card-box mt-4">
        <h5>Suggestions</h5>
        <ul id="suggestions" class="text-start"></ul>
    </div>
    <!-- PASSWORD HISTORY -->
    <div class="card-box mt-4">
        <h5>🔐 Password History</h5>
        <ul id="historyList" class="text-start history-list">
        <li class="text-muted">No passwords analyzed yet</li>
       </ul>
    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
<!-- FOOTER -->
<footer class="cyber-footer text-center mt-5">
    <div class="container">
        <p class="mb-1">
            © <span id="year"></span> Cyber Password  | Developed by Sanlytics – Password Vulnerability Ranking System
        </p>
        
    </div>
</footer>

<script>
    document.getElementById("year").innerText = new Date().getFullYear();
</script>
</html>
